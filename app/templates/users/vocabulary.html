{% extends "layout.html" %}
{% block title %}Vocabulary{% endblock %}

{% block body %}
<div class="center">
    <h2>Vocabulary</h2>
    <form class="centerDiv" action="vocabulary" method="post">
        <input class="inputField" type="text" placeholder="Word" name="word">
        <input class="inputField" type="text" placeholder="Category" name="category">
        <input class="button" type="submit" value="Add">
    </form>
    <table class="table table-hover">
        <thead>
            <tr>
                <th scope="col" id="tb_name">Word</th>
                <th scope="col" id="tb_created">Type</th>
                <th scope="col" class="tb_level">Level</th>
                <th scope="col" class="tb_delete"></th>
            </tr>
        </thead>
        <tbody>
            {% for word in words %}
            <tr>
                <td>{{ word.word }}</td>
                <td>{{ word.category }}</td>
                <td>{{ word.level }}</td>
                <td>
                    <form action="{{ url_for('content.delete_word_route', word_id=word.id_vocab) }}" method="POST">
                        <button type="submit" class="bi bi-trash3 delete"></button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
