{% extends "layout.html" %}
{% block title %}Vocabulary{% endblock %}

{% block body %}
    <h2 class="center">Vocabulary</h2>
    <form class="centerDiv" action="vocabulary" method="post">
        <input class="inputField" type="text" placeholder="Word" name="word">
        <input class="inputField" type="text" placeholder="Type" name="type">
        <input class="button" type="submit" value="Add">
    </form>
    <br><br>
    <table>
        <thead>
            <tr>
                <th id="tb_name">Word</th>
                <th id="tb_created">Type</th>
                <th id="tb_level">Level</th>
            </tr>            
        </thead>
        <tbody>
            {% for word in words %}
                <tr>
                    <td>{{ word[3] }}</td>
                    <td>{{ word[2] }}</td>
                    <td>{{ word[4] }}</td>
                </tr>
            {% endfor %}            
        </tbody>
    </table>       

{% endblock %}
