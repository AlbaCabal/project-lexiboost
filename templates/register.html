{% extends "layout.html" %}
{% block title %}Register{% endblock %}

{% block body %}
    <div class="center">
        <h2>Register</h2>
        <form action="/register" method="post">
            <label for="username">Username</label><br>
            <input class="inputField" autocomplete="off" name="username" placeholder="Username" type="text"><br><br>
            <label for="password">Password</label><br>
            <input class="inputField" name="password" placeholder="Password" type="password"><br><br>
            <label for="password">Repeat password</label><br>
            <input class="inputField" name="confirmation" placeholder="Password" type="password"><br><br>
            <input class="button" type="submit" value="Register">
        </form>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

{% endblock %}
